[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = -v -ra --strict-markers --strict-config --cov=app --cov-report=html --cov-report=term-missing -n auto
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    auth: Authentication tests
    routes: Route tests
    services: Service tests
asyncio_mode = auto

[tool.coverage.run]
source = ["app"]
omit =
    */tests/*
    */__pycache__/*
    */venv/*
    */.venv/*

[tool.coverage.report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
